services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wakeupcall}
      POSTGRES_USER: ${POSTGRES_USER:-wakeupcall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wakeupcall}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      args:
        REQUIREMENTS_FILE: requirements/development.txt
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-unsafe-compose-development-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DATABASE_URL: postgresql://${POSTGRES_USER:-wakeupcall}:${POSTGRES_PASSWORD:-wakeupcall}@db:5432/${POSTGRES_DB:-wakeupcall}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      WEATHER_API_BASE_URL: ${WEATHER_API_BASE_URL:-https://api.weatherapi.com/v1}
      WEATHER_API_CONNECT_TIMEOUT: ${WEATHER_API_CONNECT_TIMEOUT:-2.0}
      WEATHER_API_READ_TIMEOUT: ${WEATHER_API_READ_TIMEOUT:-5.0}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_VERIFY_SERVICE_SID: ${TWILIO_VERIFY_SERVICE_SID:-}
      TWILIO_HTTP_TIMEOUT: ${TWILIO_HTTP_TIMEOUT:-5.0}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
