AWSTemplateFormatVersion: "2010-09-09"
Description: Wakeup Call Phase 10 ECS, ALB, RDS, networking, secrets, and observability.

Parameters:
  EnvironmentName:
    Type: String
    Default: staging
    AllowedPattern: "[a-z0-9-]+"
  ImageUri:
    Type: String
    Description: Immutable ECR image URI including a unique tag or digest.
  ApplicationDomain:
    Type: String
    Description: DNS name included in the ACM certificate and Django allowed hosts.
  CertificateArn:
    Type: String
    Description: ACM certificate ARN in this stack's region for ApplicationDomain.
  HostedZoneId:
    Type: String
    Default: ""
    Description: Optional Route 53 public hosted zone ID; blank skips DNS record creation.
  DeliveryQueueUrl:
    Type: String
    Description: DeliveryQueueUrl output from the Phase 8 queue stack.
  DeliveryQueueArn:
    Type: String
    Description: DeliveryQueueArn output from the Phase 8 queue stack.
  AlarmTopicArn:
    Type: String
    Default: ""
    Description: Optional existing SNS topic ARN for application alarm actions.
  WebDesiredCount:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 10
    Description: Keep at zero until secrets are configured and migrations succeed.
  WorkerDesiredCount:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 10
    Description: Keep at zero until secrets are configured and migrations succeed.
  EnableRealWorkerDelivery:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  DatabaseName:
    Type: String
    Default: wakeupcall
    AllowedPattern: "[a-zA-Z][a-zA-Z0-9_]+"
  DatabaseUsername:
    Type: String
    Default: wakeupcall_admin
    AllowedPattern: "[a-zA-Z][a-zA-Z0-9_]+"
  DatabaseInstanceClass:
    Type: String
    Default: db.t4g.micro
  DatabaseMultiAZ:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  DatabaseDeletionProtection:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
  PublicSubnetOneCidr:
    Type: String
    Default: 10.42.0.0/24
  PublicSubnetTwoCidr:
    Type: String
    Default: 10.42.1.0/24
  ApplicationSubnetOneCidr:
    Type: String
    Default: 10.42.10.0/24
  ApplicationSubnetTwoCidr:
    Type: String
    Default: 10.42.11.0/24
  DatabaseSubnetOneCidr:
    Type: String
    Default: 10.42.20.0/24
  DatabaseSubnetTwoCidr:
    Type: String
    Default: 10.42.21.0/24

Conditions:
  CreateDnsRecord: !Not [!Equals [!Ref HostedZoneId, ""]]
  HasAlarmTopic: !Not [!Equals [!Ref AlarmTopicArn, ""]]
  RealWorkerDeliveryEnabled: !Equals [!Ref EnableRealWorkerDelivery, "true"]

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub wakeup-call-${EnvironmentName}

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref Vpc

  PublicSubnetOne:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Ref PublicSubnetOneCidr
      MapPublicIpOnLaunch: false
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub wakeup-call-${EnvironmentName}-public-1

  PublicSubnetTwo:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Ref PublicSubnetTwoCidr
      MapPublicIpOnLaunch: false
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub wakeup-call-${EnvironmentName}-public-2

  ApplicationSubnetOne:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Ref ApplicationSubnetOneCidr
      MapPublicIpOnLaunch: false
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub wakeup-call-${EnvironmentName}-app-1

  ApplicationSubnetTwo:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Ref ApplicationSubnetTwoCidr
      MapPublicIpOnLaunch: false
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub wakeup-call-${EnvironmentName}-app-2

  DatabaseSubnetOne:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Ref DatabaseSubnetOneCidr
      MapPublicIpOnLaunch: false
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub wakeup-call-${EnvironmentName}-db-1

  DatabaseSubnetTwo:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Ref DatabaseSubnetTwoCidr
      MapPublicIpOnLaunch: false
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub wakeup-call-${EnvironmentName}-db-2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetOneRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetOne

  PublicSubnetTwoRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetTwo

  NatElasticIp:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatElasticIp.AllocationId
      SubnetId: !Ref PublicSubnetOne

  ApplicationRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  ApplicationDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway
      RouteTableId: !Ref ApplicationRouteTable

  ApplicationSubnetOneRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref ApplicationRouteTable
      SubnetId: !Ref ApplicationSubnetOne

  ApplicationSubnetTwoRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref ApplicationRouteTable
      SubnetId: !Ref ApplicationSubnetTwo

  DatabaseRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  DatabaseSubnetOneRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref DatabaseRouteTable
      SubnetId: !Ref DatabaseSubnetOne

  DatabaseSubnetTwoRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref DatabaseRouteTable
      SubnetId: !Ref DatabaseSubnetTwo

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTPS and HTTP redirect access to the ALB.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Web tasks accept traffic only from the ALB.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup

  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Worker and migration tasks have no inbound access.
      VpcId: !Ref Vpc

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: PostgreSQL access from application tasks only.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref WebSecurityGroup
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref WorkerSecurityGroup

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private Wakeup Call database subnets.
      SubnetIds:
        - !Ref DatabaseSubnetOne
        - !Ref DatabaseSubnetTwo

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      AllocatedStorage: 20
      MaxAllocatedStorage: 100
      StorageType: gp3
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      CopyTagsToSnapshot: true
      DBInstanceClass: !Ref DatabaseInstanceClass
      DBName: !Ref DatabaseName
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      DeletionProtection: !Ref DatabaseDeletionProtection
      Engine: postgres
      EngineVersion: "17"
      ManageMasterUserPassword: true
      MasterUsername: !Ref DatabaseUsername
      MultiAZ: !Ref DatabaseMultiAZ
      PubliclyAccessible: false
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup

  ApplicationSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: Provider credentials for Wakeup Call; update before starting services.
      GenerateSecretString:
        GenerateStringKey: DJANGO_SECRET_KEY
        PasswordLength: 64
        ExcludePunctuation: true
        SecretStringTemplate: >-
          {"WEATHER_API_KEY":"","TWILIO_ACCOUNT_SID":"","TWILIO_AUTH_TOKEN":"","TWILIO_VERIFY_SERVICE_SID":"","TWILIO_SMS_FROM_NUMBER":"","TWILIO_VOICE_FROM_NUMBER":""}

  WebLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/wakeup-call/${EnvironmentName}/web
      RetentionInDays: 30

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/wakeup-call/${EnvironmentName}/worker
      RetentionInDays: 30

  MigrationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/wakeup-call/${EnvironmentName}/migration
      RetentionInDays: 30

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub wakeup-call-${EnvironmentName}
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadApplicationAndDatabaseSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref ApplicationSecret
                  - !GetAtt Database.MasterUserSecret.SecretArn

  WebTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  WorkerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ProcessDeliveryQueue
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ChangeMessageVisibility
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ReceiveMessage
                  - sqs:SendMessage
                Resource: !Ref DeliveryQueueArn

  WebTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub wakeup-call-${EnvironmentName}-web
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt WebTaskRole.Arn
      ContainerDefinitions:
        - Name: web
          Image: !Ref ImageUri
          Essential: true
          Command:
            - gunicorn
            - config.wsgi:application
            - --bind
            - 0.0.0.0:8000
            - --access-logfile
            - "-"
            - --error-logfile
            - "-"
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - Name: DJANGO_SETTINGS_MODULE
              Value: config.settings.production
            - Name: DJANGO_ALLOWED_HOSTS
              Value: !Ref ApplicationDomain
            - Name: DATABASE_HOST
              Value: !GetAtt Database.Endpoint.Address
            - Name: DATABASE_NAME
              Value: !Ref DatabaseName
            - Name: DATABASE_USER
              Value: !Ref DatabaseUsername
            - Name: DATABASE_PORT
              Value: !GetAtt Database.Endpoint.Port
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: TWILIO_VOICE_STATUS_CALLBACK_URL
              Value: !Sub https://${ApplicationDomain}/twilio/voice/status/
          Secrets:
            - Name: DJANGO_SECRET_KEY
              ValueFrom: !Sub "${ApplicationSecret}:DJANGO_SECRET_KEY::"
            - Name: DATABASE_PASSWORD
              ValueFrom: !Sub
                - "${SecretArn}:password::"
                - SecretArn: !GetAtt Database.MasterUserSecret.SecretArn
            - Name: TWILIO_AUTH_TOKEN
              ValueFrom: !Sub "${ApplicationSecret}:TWILIO_AUTH_TOKEN::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WebLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web

  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub wakeup-call-${EnvironmentName}-worker
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt WorkerTaskRole.Arn
      ContainerDefinitions:
        - Name: worker
          Image: !Ref ImageUri
          Essential: true
          Command: !If
            - RealWorkerDeliveryEnabled
            - [python, manage.py, run_delivery_worker, --allow-real-delivery]
            - [python, manage.py, run_delivery_worker]
          Environment:
            - Name: DJANGO_SETTINGS_MODULE
              Value: config.settings.production
            - Name: DJANGO_ALLOWED_HOSTS
              Value: !Ref ApplicationDomain
            - Name: DATABASE_HOST
              Value: !GetAtt Database.Endpoint.Address
            - Name: DATABASE_NAME
              Value: !Ref DatabaseName
            - Name: DATABASE_USER
              Value: !Ref DatabaseUsername
            - Name: DATABASE_PORT
              Value: !GetAtt Database.Endpoint.Port
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: DELIVERY_QUEUE_URL
              Value: !Ref DeliveryQueueUrl
            - Name: DELIVERY_REAL_WORKER_ENABLED
              Value: !Ref EnableRealWorkerDelivery
            - Name: TWILIO_VOICE_STATUS_CALLBACK_URL
              Value: !Sub https://${ApplicationDomain}/twilio/voice/status/
          Secrets:
            - Name: DJANGO_SECRET_KEY
              ValueFrom: !Sub "${ApplicationSecret}:DJANGO_SECRET_KEY::"
            - Name: DATABASE_PASSWORD
              ValueFrom: !Sub
                - "${SecretArn}:password::"
                - SecretArn: !GetAtt Database.MasterUserSecret.SecretArn
            - Name: WEATHER_API_KEY
              ValueFrom: !Sub "${ApplicationSecret}:WEATHER_API_KEY::"
            - Name: TWILIO_ACCOUNT_SID
              ValueFrom: !Sub "${ApplicationSecret}:TWILIO_ACCOUNT_SID::"
            - Name: TWILIO_AUTH_TOKEN
              ValueFrom: !Sub "${ApplicationSecret}:TWILIO_AUTH_TOKEN::"
            - Name: TWILIO_VERIFY_SERVICE_SID
              ValueFrom: !Sub "${ApplicationSecret}:TWILIO_VERIFY_SERVICE_SID::"
            - Name: TWILIO_SMS_FROM_NUMBER
              ValueFrom: !Sub "${ApplicationSecret}:TWILIO_SMS_FROM_NUMBER::"
            - Name: TWILIO_VOICE_FROM_NUMBER
              ValueFrom: !Sub "${ApplicationSecret}:TWILIO_VOICE_FROM_NUMBER::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WorkerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: worker

  MigrationTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub wakeup-call-${EnvironmentName}-migration
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt WebTaskRole.Arn
      ContainerDefinitions:
        - Name: migration
          Image: !Ref ImageUri
          Essential: true
          Command: [python, manage.py, migrate, --noinput]
          Environment:
            - Name: DJANGO_SETTINGS_MODULE
              Value: config.settings.production
            - Name: DJANGO_ALLOWED_HOSTS
              Value: !Ref ApplicationDomain
            - Name: DATABASE_HOST
              Value: !GetAtt Database.Endpoint.Address
            - Name: DATABASE_NAME
              Value: !Ref DatabaseName
            - Name: DATABASE_USER
              Value: !Ref DatabaseUsername
            - Name: DATABASE_PORT
              Value: !GetAtt Database.Endpoint.Port
          Secrets:
            - Name: DJANGO_SECRET_KEY
              ValueFrom: !Sub "${ApplicationSecret}:DJANGO_SECRET_KEY::"
            - Name: DATABASE_PASSWORD
              ValueFrom: !Sub
                - "${SecretArn}:password::"
                - SecretArn: !GetAtt Database.MasterUserSecret.SecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref MigrationLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: migration

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      Subnets:
        - !Ref PublicSubnetOne
        - !Ref PublicSubnetTwo

  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckEnabled: true
      HealthCheckPath: /health/
      HealthCheckProtocol: HTTP
      HealthyThresholdCount: 2
      Matcher:
        HttpCode: "200"
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      UnhealthyThresholdCount: 3
      VpcId: !Ref Vpc

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06

  WebService:
    Type: AWS::ECS::Service
    DependsOn: HttpsListener
    Properties:
      Cluster: !Ref Cluster
      DesiredCount: !Ref WebDesiredCount
      EnableECSManagedTags: true
      HealthCheckGracePeriodSeconds: 60
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref WebSecurityGroup
          Subnets:
            - !Ref ApplicationSubnetOne
            - !Ref ApplicationSubnetTwo
      LoadBalancers:
        - ContainerName: web
          ContainerPort: 8000
          TargetGroupArn: !Ref WebTargetGroup
      TaskDefinition: !Ref WebTaskDefinition

  WorkerService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref Cluster
      DesiredCount: !Ref WorkerDesiredCount
      EnableECSManagedTags: true
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref WorkerSecurityGroup
          Subnets:
            - !Ref ApplicationSubnetOne
            - !Ref ApplicationSubnetTwo
      TaskDefinition: !Ref WorkerTaskDefinition

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: CreateDnsRecord
    Properties:
      AliasTarget:
        DNSName: !GetAtt LoadBalancer.DNSName
        HostedZoneId: !GetAtt LoadBalancer.CanonicalHostedZoneID
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApplicationDomain
      Type: A

  UnhealthyWebTargetAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: At least one web target is unhealthy.
      AlarmActions: !If
        - HasAlarmTopic
        - [!Ref AlarmTopicArn]
        - !Ref "AWS::NoValue"
      Namespace: AWS/ApplicationELB
      MetricName: UnHealthyHostCount
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
        - Name: TargetGroup
          Value: !GetAtt WebTargetGroup.TargetGroupFullName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  WebFiveHundredAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Web targets returned five or more 5xx responses in five minutes.
      AlarmActions: !If
        - HasAlarmTopic
        - [!Ref AlarmTopicArn]
        - !Ref "AWS::NoValue"
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_Target_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  DatabaseStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: RDS free storage is below two GiB.
      AlarmActions: !If
        - HasAlarmTopic
        - [!Ref AlarmTopicArn]
        - !Ref "AWS::NoValue"
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref Database
      Statistic: Minimum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 2147483648
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching

Outputs:
  ApplicationSecretArn:
    Value: !Ref ApplicationSecret
  ClusterArn:
    Value: !GetAtt Cluster.Arn
  LoadBalancerDnsName:
    Value: !GetAtt LoadBalancer.DNSName
  MigrationTaskDefinitionArn:
    Value: !Ref MigrationTaskDefinition
  ApplicationSubnetIds:
    Value: !Join [",", [!Ref ApplicationSubnetOne, !Ref ApplicationSubnetTwo]]
  WebSecurityGroupId:
    Value: !Ref WebSecurityGroup
  WorkerSecurityGroupId:
    Value: !Ref WorkerSecurityGroup
  WebServiceName:
    Value: !GetAtt WebService.Name
  WorkerServiceName:
    Value: !GetAtt WorkerService.Name
